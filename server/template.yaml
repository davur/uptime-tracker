AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Device uptime reporting — Lambda + DynamoDB

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    Environment:
      Variables:
        UPTIME_TABLE_NAME: !Ref UptimeTable

Resources:

  # ── DynamoDB table ──────────────────────────────────────────────────────────
  UptimeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: uptime-reports
      BillingMode: PAY_PER_REQUEST      # free-tier friendly at this scale
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: session_start  # ISO 8601 string — sorts lexicographically
          AttributeType: S
      KeySchema:
        - AttributeName: device_id      # partition key
          KeyType: HASH
        - AttributeName: session_start  # sort key — one row per boot session
          KeyType: RANGE

  # ── Lambda function ─────────────────────────────────────────────────────────
  UptimeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: uptime-reporter
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UptimeTable
      Events:
        PostReport:
          Type: Api
          Properties:
            RestApiId: !Ref UptimeApi
            Path: /report
            Method: POST
        GetDeviceUptime:
          Type: Api
          Properties:
            RestApiId: !Ref UptimeApi
            Path: /devices/{device_id}/uptime
            Method: GET

  # ── API Gateway ─────────────────────────────────────────────────────────────
  UptimeApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: uptime-api
      StageName: prod
      Auth:
        ApiKeyRequired: true            # devices must send x-api-key header
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: uptime-plan

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${UptimeApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  TableName:
    Description: DynamoDB table name
    Value: !Ref UptimeTable
